<!DOCTYPE html>
<html>
<head>
  <title>Saved Jokes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <h1>❤️ Saved Jokes</h1>

  {% if jokes %}
    {% for joke in jokes %}
      <p>{{ joke }}</p>
      <hr>
    {% endfor %}
  {% else %}
    <p>No jokes saved yet 😢</p>
  {% endif %}

  <a href="/">⬅ Back</a>
</body>
</html>
